services:
  postgres:
    image: postgres:16-alpine
    container_name: yapz-postgres
    environment:
      POSTGRES_USER: yapz
      POSTGRES_PASSWORD: yapz
      POSTGRES_DB: yapz
    ports:
      - "5432:5432"
    volumes:
      - yapz-postgres:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapz -d yapz"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yapz-backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://yapz:yapz@postgres:5432/yapz?sslmode=disable
      JWT_SECRET: dev-change-me
      CORS_ORIGIN: http://localhost:3000
      ADMIN_EMAIL: admin@yapz.local
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin123456
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - yapz-go-cache:/go/pkg/mod
    command: go run ./cmd/api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yapz-frontend
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - yapz-node-modules:/app/node_modules
      - yapz-next-cache:/app/.next
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  yapz-postgres:
  yapz-go-cache:
  yapz-node-modules:
  yapz-next-cache:
