services:
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: yapz-garage
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_CONFIG_FILE: /etc/garage.toml
      GARAGE_DEFAULT_ACCESS_KEY: GKYAPZLOCALDEV0000000000000000
      GARAGE_DEFAULT_SECRET_KEY: yapz-local-dev-secret-change-me-000000000000000000000000
      GARAGE_DEFAULT_BUCKET: yapz-images
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - yapz-garage-meta:/var/lib/garage/meta
      - yapz-garage-data:/var/lib/garage/data

  postgres:
    image: postgres:16-alpine
    container_name: yapz-postgres
    environment:
      POSTGRES_USER: yapz
      POSTGRES_PASSWORD: yapz
      POSTGRES_DB: yapz
    ports:
      - "5432:5432"
    volumes:
      - yapz-postgres:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yapz -d yapz"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yapz-backend
    environment:
      PORT: 8080
      DATABASE_URL: postgres://yapz:yapz@postgres:5432/yapz?sslmode=disable
      JWT_SECRET: dev-change-me
      CORS_ORIGIN: http://localhost:3000
      ADMIN_EMAIL: admin@yapz.local
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: Admin123456
      UPLOAD_DIR: /app/uploads
      STORAGE_DRIVER: garage
      S3_ENDPOINT: http://garage:3900
      S3_REGION: garage
      S3_BUCKET: yapz-images
      S3_ACCESS_KEY_ID: GKYAPZLOCALDEV0000000000000000
      S3_SECRET_ACCESS_KEY: yapz-local-dev-secret-change-me-000000000000000000000000
    ports:
      - "8080:8080"
    depends_on:
      garage:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - yapz-uploads:/app/uploads
      - yapz-go-cache:/go/pkg/mod
    command: go run ./cmd/api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yapz-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  yapz-postgres:
  yapz-go-cache:
  yapz-uploads:
  yapz-garage-meta:
  yapz-garage-data:
